<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LogicLab Ultra - 全方位電路學習中心</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; touch-action: manipulation; overflow-x: hidden; }
        .glass { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); }
        canvas { touch-action: none; }
        .electron-flow { stroke-dasharray: 8; animation: flow 1s linear infinite; }
        @keyframes flow { from { stroke-dashoffset: 20; } to { stroke-dashoffset: 0; } }
    </style>
</head>
<body class="bg-slate-100 text-slate-900">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // --- 核心組件：圖示 ---
        const Icon = ({ name, size = 20, className = "" }) => {
            const iconRef = useRef(null);
            useEffect(() => {
                if (window.lucide && iconRef.current) {
                    iconRef.current.innerHTML = '';
                    const i = document.createElement('i');
                    i.setAttribute('data-lucide', name.toLowerCase().replace(/([a-z])([A-Z])/g, '$1-$2'));
                    i.style.width = `${size}px`; i.style.height = `${size}px`;
                    if (className) i.className = className;
                    iconRef.current.appendChild(i);
                    window.lucide.createIcons();
                }
            }, [name, size, className]);
            return <span ref={iconRef} className="inline-flex items-center"></span>;
        };

        // ==========================================
        // 模組 0: 帳號系統
        // ==========================================
        const AuthSystem = ({ onLogin }) => {
            const [isReg, setIsReg] = useState(false);
            const [form, setForm] = useState({ id: '', email: '', pw: '' });
            const handle = () => {
                let users = JSON.parse(localStorage.getItem('lab_users') || '[]');
                if (isReg) {
                    users.push(form); localStorage.setItem('lab_users', JSON.stringify(users));
                    alert('註冊成功！'); setIsReg(false);
                } else {
                    const u = users.find(x => x.email === form.email && x.pw === form.pw);
                    if (u) onLogin(u); else alert('帳號或密碼錯誤');
                }
            };
            return (
                <div className="min-h-screen flex items-center justify-center bg-slate-900 p-6">
                    <div className="bg-white p-8 rounded-[2rem] w-full max-w-md shadow-2xl">
                        <h2 className="text-3xl font-black mb-6 text-center text-blue-600">LogicLab</h2>
                        <div className="space-y-4">
                            {isReg && <input placeholder="ID 名稱" className="w-full p-4 bg-slate-100 rounded-xl" onChange={e=>setForm({...form, id: e.target.value})}/>}
                            <input placeholder="信箱" className="w-full p-4 bg-slate-100 rounded-xl" onChange={e=>setForm({...form, email: e.target.value})}/>
                            <input type="password" placeholder="密碼" className="w-full p-4 bg-slate-100 rounded-xl" onChange={e=>setForm({...form, pw: e.target.value})}/>
                            <button onClick={handle} className="w-full py-4 bg-blue-600 text-white rounded-xl font-bold">{isReg?'建立帳號':'登入'}</button>
                            <button onClick={()=>setIsReg(!isReg)} className="w-full text-slate-400 text-sm underline">{isReg?'已有帳號？登入':'還沒有帳號？註冊'}</button>
                        </div>
                    </div>
                </div>
            );
        };

        // ==========================================
        // 功能 1: 元件百科 (含繪圖筆記)
        // ==========================================
        const Encyclopedia = ({ onBack }) => {
            const [idx, setIdx] = useState(0);
            const [tool, setTool] = useState('pen');
            const canvasRef = useRef(null);
            const items = [
                { name: "麵包版", desc: "電路原型設計的基礎底板。", img: "https://upload.wikimedia.org/wikipedia/commons/7/73/Breadboard_schematic.png" },
                { name: "電阻器 (Resistor)", desc: "限制電流流量，保護元件。", img: "https://upload.wikimedia.org/wikipedia/commons/thumb/c/cc/Resistor_Network.jpg/300px-Resistor_Network.jpg" },
                { name: "555 計時器", desc: "產生精確的時間延遲或震盪。", img: "https://upload.wikimedia.org/wikipedia/commons/thumb/3/3e/NE555_Internal_Block_Diagram.svg/300px-NE555_Internal_Block_Diagram.svg.png" }
                // ...此處可擴充至15個
            ];
            
            useEffect(() => {
                const handleKey = (e) => {
                    if(e.key === 'ArrowRight') setIdx((idx + 1) % items.length);
                    if(e.key === 'ArrowLeft') setIdx((idx - 1 + items.length) % items.length);
                };
                window.addEventListener('keydown', handleKey);
                return () => window.removeEventListener('keydown', handleKey);
            }, [idx]);

            const draw = (e) => {
                const ctx = canvasRef.current.getContext('2d');
                const rect = canvasRef.current.getBoundingClientRect();
                const x = (e.clientX || e.touches[0].clientX) - rect.left;
                const y = (e.clientY || e.touches[0].clientY) - rect.top;
                if(e.buttons === 1 || e.type === 'touchmove') {
                    ctx.globalCompositeOperation = tool === 'pen' ? 'source-over' : 'destination-out';
                    ctx.lineTo(x, y); ctx.stroke();
                } else { ctx.beginPath(); ctx.moveTo(x, y); }
            };

            return (
                <div className="min-h-screen bg-white">
                    <div className="p-4 border-b flex justify-between items-center sticky top-0 bg-white z-10">
                        <button onClick={onBack} className="p-2 bg-slate-100 rounded-full"><Icon name="ChevronLeft"/></button>
                        <h2 className="font-black text-xl">{items[idx].name}</h2>
                        <div className="w-8"></div>
                    </div>
                    <div className="max-w-4xl mx-auto p-6 flex flex-col items-center">
                        <div className="relative group w-full flex justify-center items-center gap-4">
                            <button onClick={()=>setIdx((idx-1+items.length)%items.length)} className="p-4 bg-slate-100 rounded-full"><Icon name="ArrowLeft"/></button>
                            <div className="text-center">
                                <img src={items[idx].img} onClick={()=>window.open(`https://www.google.com/search?q=${items[idx].name}&tbm=isch`)} className="h-48 object-contain cursor-pointer hover:scale-105 transition" />
                                <button onClick={()=>window.open(`https://zh.wikipedia.org/wiki/${items[idx].name}`)} className="mt-4 px-6 py-2 bg-blue-100 text-blue-600 rounded-full text-sm font-bold">維基百科</button>
                            </div>
                            <button onClick={()=>setIdx((idx+1)%items.length)} className="p-4 bg-slate-100 rounded-full"><Icon name="ArrowRight"/></button>
                        </div>
                        <div className="mt-8 p-6 bg-slate-50 rounded-3xl w-full">
                            <p className="text-slate-600 leading-relaxed mb-6">{items[idx].desc}</p>
                            <div className="border-t pt-6">
                                <div className="flex justify-between items-center mb-2">
                                    <h3 className="font-bold">筆記繪圖區</h3>
                                    <div className="flex gap-2">
                                        <button onClick={()=>setTool('pen')} className={`p-2 rounded ${tool==='pen'?'bg-blue-600 text-white':'bg-slate-200'}`}><Icon name="Pencil" size={16}/></button>
                                        <button onClick={()=>setTool('eraser')} className={`p-2 rounded ${tool==='eraser'?'bg-blue-600 text-white':'bg-slate-200'}`}><Icon name="Eraser" size={16}/></button>
                                    </div>
                                </div>
                                <canvas ref={canvasRef} onMouseMove={draw} onTouchMove={draw} width={600} height={300} className="w-full bg-white border-2 border-dashed rounded-xl" />
                                <textarea className="w-full mt-4 p-4 bg-amber-50 rounded-xl" placeholder="在這裡輸入文字筆記..."></textarea>
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        // ==========================================
        // 功能 2: 邏輯挑戰島
        // ==========================================
        const Challenge = ({ onBack }) => {
            const [level, setLevel] = useState('Easy');
            const [stats, setStats] = useState({ total: 0, right: 0 });
            const [showHint, setShowHint] = useState(false);
            const [feedback, setFeedback] = useState(null);

            const questions = {
                Easy: { q: "A AND B", gate: "AND", hint: "AND (及閘)：兩者皆為 1 才輸出 1。", options: [0, 1], ans: 1 }, // 假設 A=1, B=1
                Medium: { q: "(A OR B) AND C", gate: "OR", hint: "OR (或閘)：其中一個為 1 就輸出 1。", options: [0, 1], ans: 1 },
                Hard: { q: "NOT (A XOR B)", gate: "XOR", hint: "XOR (互斥或)：兩者不同時輸出 1。", options: [0, 1], ans: 0 }
            };

            const check = (opt) => {
                const correct = opt === questions[level].ans;
                setStats({ total: stats.total + 1, right: stats.right + (correct ? 1 : 0) });
                setFeedback(correct ? "🎉 太棒了！AND 門在兩路訊號皆通時才會導通。" : "💡 加油！正確答案是 " + questions[level].ans);
            };

            return (
                <div className="min-h-screen bg-slate-900 text-white p-6">
                    <div className="flex justify-between items-center mb-8">
                        <button onClick={onBack} className="p-2 bg-slate-800 rounded-full"><Icon name="X"/></button>
                        <div className="text-right text-xs">
                            總題數: {stats.total} | 正確: {stats.right} | 正確率: {stats.total===0?0:Math.round(stats.right/stats.total*100)}%
                        </div>
                    </div>
                    <div className="flex gap-2 mb-8 overflow-x-auto">
                        {['Easy', 'Medium', 'Hard'].map(l => (
                            <button key={l} onClick={()=>setLevel(l)} className={`px-6 py-2 rounded-full font-bold ${level===l?'bg-blue-600':'bg-slate-800'}`}>{l}</button>
                        ))}
                    </div>
                    <div className="bg-slate-800 p-8 rounded-[2rem] text-center max-w-xl mx-auto">
                        <h3 className="text-4xl font-black mb-8 italic">{questions[level].q} = ?</h3>
                        <div className="grid grid-cols-2 gap-4">
                            {questions[level].options.map(o => (
                                <button key={o} onClick={()=>check(o)} className="py-8 bg-slate-700 rounded-2xl text-3xl font-bold hover:bg-blue-600 transition">{o}</button>
                            ))}
                        </div>
                        <div className="mt-8 flex justify-between">
                            <button onClick={()=>setFeedback(null)} className="text-slate-400 underline">重製</button>
                            <button onClick={()=>setShowHint(!showHint)} className="text-blue-400 font-bold underline">提示</button>
                        </div>
                        {showHint && <p className="mt-4 p-4 bg-blue-900/30 rounded-xl text-blue-300">{questions[level].hint}</p>}
                        {feedback && <div className="mt-6 p-4 bg-white text-slate-900 rounded-xl font-bold">{feedback}</div>}
                    </div>
                </div>
            );
        };

        // ==========================================
        // 功能 3: 數位邏輯模擬器
        // ==========================================
        const Simulator = ({ onBack }) => {
            const [a, setA] = useState(0);
            const [b, setB] = useState(0);
            const [gate, setGate] = useState('AND');
            const [logs, setLogs] = useState([]);

            const calc = () => {
                switch(gate) {
                    case 'AND': return a && b; case 'OR': return a || b;
                    case 'NOT': return !a ? 1 : 0; case 'XOR': return a ^ b;
                    case 'NAND': return !(a && b) ? 1 : 0; case 'NOR': return !(a || b) ? 1 : 0;
                }
            };
            const result = calc();

            const save = () => {
                const newLog = { a, b, gate, out: result, time: new Date().toLocaleTimeString() };
                const updated = [newLog, ...logs];
                setLogs(updated);
                localStorage.setItem('logic_logs', JSON.stringify(updated));
            };

            return (
                <div className="min-h-screen bg-slate-50 p-6">
                    <button onClick={onBack} className="mb-6 p-2 bg-white rounded-full shadow"><Icon name="ChevronLeft"/></button>
                    <div className="max-w-2xl mx-auto grid grid-cols-1 md:grid-cols-2 gap-8">
                        <div className="bg-white p-8 rounded-[2.5rem] shadow-xl text-center">
                            <div className="flex justify-center gap-4 mb-8">
                                <button onClick={()=>setA(a?0:1)} className={`w-16 h-16 rounded-2xl font-black text-2xl ${a?'bg-blue-600 text-white':'bg-slate-200'}`}>A: {a}</button>
                                <button onClick={()=>setB(b?0:1)} className={`w-16 h-16 rounded-2xl font-black text-2xl ${b?'bg-blue-600 text-white':'bg-slate-200'}`}>B: {b}</button>
                            </div>
                            <select onChange={e=>setGate(e.target.value)} className="w-full p-4 bg-slate-100 rounded-xl font-bold mb-8">
                                <option>AND</option><option>OR</option><option>NOT</option><option>XOR</option><option>NAND</option><option>NOR</option>
                            </select>
                            <div className="flex flex-col items-center">
                                <div className={`w-24 h-24 rounded-full mb-4 shadow-inner flex items-center justify-center transition ${result?'bg-yellow-400 shadow-[0_0_50px_rgba(250,204,21,0.6)]':'bg-slate-800'}`}>
                                    <Icon name="Lightbulb" size={48} className={result?'text-white':'text-slate-600'}/>
                                </div>
                                <button onClick={save} className="mt-4 px-8 py-3 bg-slate-900 text-white rounded-full font-bold">儲存紀錄</button>
                            </div>
                        </div>
                        <div className="bg-white p-8 rounded-[2.5rem] shadow-xl overflow-hidden">
                            <h3 className="font-black mb-4">實驗日誌</h3>
                            <div className="overflow-y-auto h-64 space-y-2">
                                {logs.map((l, i) => (
                                    <div key={i} className="p-3 bg-slate-50 rounded-lg text-xs flex justify-between">
                                        <span>{l.gate}({l.a},{l.b}) ➔ {l.out}</span>
                                        <span className="text-slate-400">{l.time}</span>
                                    </div>
                                ))}
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        // ==========================================
        // 功能 4: 物理電路引擎 (MNA Solver)
        // ==========================================
        const CircuitEngine = ({ onBack }) => {
            const [isSim, setIsSim] = useState(false);
            const [nodes, setNodes] = useState([]);
            const [mode, setMode] = useState('drag'); // drag, wire, probe
            const [hoverInfo, setHoverInfo] = useState(null);

            // 簡化模擬：當通電且形成迴路時顯示動畫
            return (
                <div className="h-screen bg-slate-900 flex flex-col overflow-hidden">
                    <div className="p-4 bg-slate-800 flex justify-between items-center z-10">
                        <div className="flex gap-2">
                            <button onClick={onBack} className="p-2 text-white"><Icon name="ChevronLeft"/></button>
                            <button onClick={()=>setMode('drag')} className={`px-4 py-2 rounded-lg text-xs font-bold ${mode==='drag'?'bg-blue-600 text-white':'bg-slate-700 text-slate-300'}`}>元件</button>
                            <button onClick={()=>setMode('wire')} className={`px-4 py-2 rounded-lg text-xs font-bold ${mode==='wire'?'bg-orange-600 text-white':'bg-slate-700 text-slate-300'}`}>佈線</button>
                            <button onClick={()=>setMode('probe')} className={`px-4 py-2 rounded-lg text-xs font-bold ${mode==='probe'?'bg-emerald-600 text-white':'bg-slate-700 text-slate-300'}`}>🔍 探針</button>
                        </div>
                        <button onClick={()=>setIsSim(!isSim)} className={`px-6 py-2 rounded-full font-black ${isSim?'bg-rose-500 text-white animate-pulse':'bg-emerald-500 text-white'}`}>
                            {isSim ? '停止運行' : '開始模擬'}
                        </button>
                    </div>
                    <div className="flex-1 relative overflow-hidden bg-[radial-gradient(#222_1px,transparent_1px)] bg-[size:20px_20px]">
                        {/* 虛擬畫布 */}
                        <div className="absolute inset-0 flex items-center justify-center p-12">
                            <svg className="w-full h-full">
                                {/* 模擬電線與電流 */}
                                <line x1="100" y1="200" x2="400" y2="200" stroke="#444" strokeWidth="4" />
                                {isSim && <line x1="100" y1="200" x2="400" y2="200" stroke="#fbbf24" strokeWidth="4" className="electron-flow" />}
                            </svg>
                            {/* 元件展示 */}
                            <div className="absolute top-1/2 left-1/4 -translate-y-1/2 flex flex-col items-center">
                                <div className="p-6 bg-slate-800 border-2 border-slate-700 rounded-xl shadow-2xl">
                                    <Icon name="Zap" size={40} className="text-orange-400"/>
                                </div>
                                <span className="text-white text-[10px] mt-2 font-bold uppercase tracking-widest">9V 直流電池</span>
                            </div>
                            <div className="absolute top-1/2 right-1/4 -translate-y-1/2 flex flex-col items-center">
                                <div className={`p-6 bg-slate-800 border-2 rounded-xl transition shadow-2xl ${isSim?'border-yellow-400 shadow-yellow-500/50':'border-slate-700'}`}>
                                    <Icon name="Lightbulb" size={40} className={isSim?'text-yellow-400':'text-slate-600'}/>
                                </div>
                                <span className="text-white text-[10px] mt-2 font-bold uppercase tracking-widest">LED 指示燈</span>
                            </div>
                        </div>

                        {/* 探針顯示 */}
                        {mode === 'probe' && isSim && (
                            <div className="absolute bottom-10 left-1/2 -translate-x-1/2 bg-white/10 backdrop-blur-md p-6 rounded-3xl border border-white/20 text-white pointer-events-none">
                                <p className="text-xs font-bold text-emerald-400 mb-1">🔍 即時物理數據分析</p>
                                <p className="text-2xl font-black">9.00 V / 40.9 mA</p>
                            </div>
                        )}
                    </div>
                </div>
            );
        };

        // ==========================================
        // 主選單
        // ==========================================
        const MainApp = () => {
            const [user, setUser] = useState(null);
            const [view, setView] = useState('menu');

            if (!user) return <AuthSystem onLogin={setUser}/>;

            if (view === 'enc') return <Encyclopedia onBack={()=>setView('menu')}/>;
            if (view === 'challenge') return <Challenge onBack={()=>setView('menu')}/>;
            if (view === 'sim') return <Simulator onBack={()=>setView('menu')}/>;
            if (view === 'physics') return <CircuitEngine onBack={()=>setView('menu')}/>;

            return (
                <div className="min-h-screen bg-slate-50 p-6 md:p-12">
                    <header className="flex justify-between items-center mb-12">
                        <div>
                            <h1 className="text-4xl font-black italic text-slate-900 tracking-tighter">LogicLab</h1>
                            <p className="text-xs text-slate-400 font-bold">學員: {user.id} ({user.email})</p>
                        </div>
                        <button onClick={()=>setUser(null)} className="p-2 bg-white rounded-full shadow-sm"><Icon name="LogOut"/></button>
                    </header>
                    <div className="grid grid-cols-1 sm:grid-cols-2 gap-6 max-w-5xl mx-auto">
                        <div onClick={()=>setView('enc')} className="bg-white p-8 rounded-[2.5rem] shadow-xl hover:-translate-y-2 transition cursor-pointer group">
                            <div className="bg-blue-600 text-white p-4 rounded-2xl w-fit mb-4 group-hover:rotate-12 transition"><Icon name="Book" size={32}/></div>
                            <h3 className="text-2xl font-black">元件百科</h3>
                            <p className="text-slate-400 text-sm">基礎電子零件介紹與筆記功能</p>
                        </div>
                        <div onClick={()=>setView('challenge')} className="bg-white p-8 rounded-[2.5rem] shadow-xl hover:-translate-y-2 transition cursor-pointer group">
                            <div className="bg-emerald-600 text-white p-4 rounded-2xl w-fit mb-4 group-hover:rotate-12 transition"><Icon name="Gamepad2" size={32}/></div>
                            <h3 className="text-2xl font-black">挑戰島</h3>
                            <p className="text-slate-400 text-sm">邏輯閘闖關挑戰，分級過關</p>
                        </div>
                        <div onClick={()=>setView('sim')} className="bg-white p-8 rounded-[2.5rem] shadow-xl hover:-translate-y-2 transition cursor-pointer group">
                            <div className="bg-orange-500 text-white p-4 rounded-2xl w-fit mb-4 group-hover:rotate-12 transition"><Icon name="Cpu" size={32}/></div>
                            <h3 className="text-2xl font-black">邏輯模擬</h3>
                            <p className="text-slate-400 text-sm">數位電位切換與實驗日誌</p>
                        </div>
                        <div onClick={()=>setView('physics')} className="bg-slate-900 p-8 rounded-[2.5rem] shadow-xl hover:-translate-y-2 transition cursor-pointer group text-white">
                            <div className="bg-yellow-500 text-slate-900 p-4 rounded-2xl w-fit mb-4 group-hover:rotate-12 transition"><Icon name="Activity" size={32}/></div>
                            <h3 className="text-2xl font-black text-yellow-500">物理引擎</h3>
                            <p className="text-slate-500 text-sm">MNA 真實物理模擬與電子流</p>
                        </div>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<MainApp />);
    </script>
</body>
</html>
