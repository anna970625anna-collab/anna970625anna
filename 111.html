<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<title>WebCircuit Ultra | Nodal Analysis MNA 多檔合併版</title>
<style>
:root {
    --dark-bg: #0f172a; --panel-bg: #1e293b; --grid-color: #334155;
    --accent: #14b8a6; --danger: #ef4444; --warning: #f59e0b; --text: #f8fafc;
    --save: #8b5cf6; --lib-bg: #1e293b;
}
body { margin: 0; background: var(--dark-bg); color: var(--text); font-family: 'Inter', system-ui, sans-serif; overflow: hidden; user-select: none; }


#toolbar {
    height: 65px; background: var(--panel-bg); display: flex; align-items: center;
    padding: 0 20px; gap: 12px; border-bottom: 1px solid rgba(255,255,255,0.1); z-index: 100; position: relative;
    box-shadow: 0 4px 15px rgba(0,0,0,0.3);
}
.group { display: flex; align-items: center; gap: 5px; background: rgba(0,0,0,0.2); padding: 6px 12px; border-radius: 8px; border: 1px solid rgba(255,255,255,0.05); }
.btn {
    padding: 8px 14px; background: transparent; border: 1px solid transparent;
    color: #cbd5e1; cursor: pointer; border-radius: 6px; font-size: 13px; transition: all 0.2s;
    display: flex; align-items: center; gap: 6px; font-weight: 500;
}
.btn:hover { background: rgba(255,255,255,0.1); color: white; }
.btn.active { background: var(--accent); color: #022c22; font-weight: bold; box-shadow: 0 0 10px rgba(20, 184, 166, 0.4); }
.btn-spawn { border: 1px solid #475569; cursor: grab; }
.btn-spawn:active { cursor: grabbing; }
.btn-file { color: #a78bfa; border-color: rgba(139, 92, 246, 0.3); }
.btn-file:hover { background: var(--save); color: white; }
.btn-danger { color: var(--danger); border-color: rgba(239, 68, 68, 0.3); }

#proj-title { font-size: 14px; color: #94a3b8; margin-left: 10px; font-family: monospace; border-left: 1px solid #475569; padding-left: 15px; }


#canvas-container { position: relative; width: 100vw; height: calc(100vh - 65px); cursor: crosshair; }
canvas { background-image: radial-gradient(var(--grid-color) 1px, transparent 1px); background-size: 20px 20px; width: 100%; height: 100%; }


#status-bar {
    position: absolute; bottom: 20px; left: 20px; background: rgba(15, 23, 42, 0.85);
    padding: 12px 20px; font-family: 'JetBrains Mono', Consolas, monospace; font-size: 13px;

    backdrop-filter: blur(8px); box-shadow: 0 10px 25px rgba(0,0,0,0.5); pointer-events: none; min-width: 200px;
}

.status-label { color: #94a3b8; }
.status-val { color: var(--accent); font-weight: bold; }
.alert { color: var(--danger); font-weight: bold; animation: pulse 0.5s infinite alternate; display: none; text-shadow: 0 0 8px rgba(239,68,68,0.6); margin-top: 5px;}


#help-text {
    position: absolute; top: 15px; right: 20px; color: #64748b; font-size: 12px; pointer-events: none; text-align: right; line-height: 1.6; background: rgba(15,23,42,0.7); padding: 10px;
    border-radius: 8px;
}
#probe-tooltip {
    position: absolute; display: none; background: #f8fafc; color: #0f172a;
    padding: 8px 12px; border-radius: 6px; font-family: 'JetBrains Mono', monospace; font-weight: bold;
    font-size: 12px; pointer-events: none; box-shadow: 0 4px 15px rgba(0,0,0,0.4);
    border-left: 4px solid var(--accent); transform: translate(15px, 15px); z-index: 200; white-space: pre-line;
}
/* 檔案庫 Modal UI */
#modal-overlay {
    display: none; position: absolute; top: 0; left: 0; width: 100vw; height: 100vh;
    background: rgba(0,0,0,0.7); z-index: 999; justify-content: center; align-items: center; backdrop-filter: blur(3px);
}
#file-manager {
    background: var(--lib-bg); padding: 25px; border-radius: 12px; width: 550px;
    border: 1px solid #475569; box-shadow: 0 20px 40px rgba(0,0,0,0.6); display: flex; flex-direction: column; max-height: 85vh;
}
.file-item {
    display: flex; justify-content: space-between; align-items: center; padding: 12px;
    background: #0f172a; border-radius: 6px; border: 1px solid #334155; margin-bottom: 8px; transition: all 0.2s;
}
.file-item:hover { border-color: var(--accent); }
.file-info { display: flex; align-items: center; gap: 15px; flex: 1; }
.file-info input[type="checkbox"] { width: 18px; height: 18px; cursor: pointer; accent-color: var(--accent); }
.file-info h4 { margin: 0 0 4px 0; color: white; font-size: 14px; }
.file-info p { margin: 0; color: #64748b; font-size: 11px; font-family: monospace; }
.file-actions button { padding: 6px 12px; font-size: 12px; border-radius: 4px; cursor: pointer; border: none; font-weight: bold; }
.btn-load { background: #334155; color: white; margin-right: 5px; }
.btn-load:hover { background: var(--accent); color: #022c22; }
.btn-del { background: transparent; color: #64748b; font-size: 14px; padding: 4px 8px; }
.btn-del:hover { color: var(--danger); }
.merge-btn { background: var(--accent); color: #022c22; padding: 12px; font-size: 14px; font-weight: bold; border: none; border-radius: 6px; cursor: pointer; margin-bottom: 15px; box-shadow: 0 4px 10px rgba(20, 184, 166, 0.3); transition: 0.2s; }
.merge-btn:hover { filter: brightness(1.1); transform: translateY(-1px); }


@keyframes pulse { from { opacity: 0.6; transform: scale(0.98); } to { opacity: 1; transform: scale(1.02); } }
</style>

<body oncontextmenu="return false;">
<div id="toolbar">
    <div style="font-weight: 900; color: white; font-size: 18px; letter-spacing: 0.5px;">
        WebCircuit <span style="color: var(--accent);">ULTRA</span>
    </div>
    <div id="proj-title">未命名專案</div>


    <div class="group" style="margin-left: 10px;">
        <button class="btn btn-file" onclick="newProject()">📄 新增清空</button>
        <button class="btn btn-file" onclick="quickSave()">💾 儲存專案</button>
        <button class="btn btn-file" onclick="openFileManager()">📂 檔案庫(合併多檔)</button>
    </div>
    <div class="group">
        <button class="btn active" id="btn-select" onclick="setMode('select')">👆 選擇/移動</button>
        <button class="btn" id="btn-wire" onclick="setMode('wire')">✏️ 自由佈線</button>
        <button class="btn" id="btn-probe" onclick="setMode('probe')">🔍 數學探針</button>
    </div>


    <div class="group">
        <button class="btn btn-spawn" onmousedown="startDragSpawn(event, 'BATTERY')">🔋 供電</button>
        <button class="btn btn-spawn" onmousedown="startDragSpawn(event, 'RESISTOR')">🚧 電阻</button>
        <button class="btn btn-spawn" onmousedown="startDragSpawn(event, 'LED')">💡 指示燈</button>
        <button class="btn btn-spawn" onmousedown="startDragSpawn(event, 'SWITCH')">🔘 開關</button>
    </div>
</div>


<div id="canvas-container">
    <canvas id="circuitCanvas"></canvas>


    <div id="help-text">
        🖱️ <b>拖曳元件</b>：電線會自動黏貼跟隨<br>
        🖱️ <b>防誤刪機制</b>：右鍵點第一下標記，第二下刪除<br>
        ⌨️ <b>Shift + 點擊</b>：更改真實數值 (V, Ω)<br>
        🔘 <b>切換到探針模式</b>：查看各節點真實電壓/電流
    </div>
    <div id="probe-tooltip"></div>
    <div id="status-bar">
        <div class="status-row"><span class="status-label">求解器:</span><span class="status-val" style="color:#38bdf8">MNA 矩陣運算</span></div>
        <div class="status-row"><span class="status-label">節點數量:</span><span class="status-val" id="ui-nodes">0</span></div>
        <div class="status-row"><span class="status-label">系統總電流:</span><span class="status-val" id="ui-current">0.00 mA</span></div>
        <div id="ui-alert" class="alert">⚠️ 物理短路！電流過載 (>5A)</div>

</div>


<div id="modal-overlay">
    <div id="file-manager">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom: 15px;">
            <h3 style="margin:0; color:white;">📂 專案檔案庫</h3>
            <button onclick="closeFileManager()" style="background:transparent; border:none; color:#94a3b8; font-size:18px; cursor:pointer;">✖</button>
        </div>
       
        <button class="merge-btn" onclick="loadSelectedFiles()">🚀 將勾選的檔案合併載入至同一個畫布</button>


        <div id="file-list" style="overflow-y: auto; flex: 1; min-height: 200px; margin-bottom: 20px; border-bottom: 1px solid #334155; padding-bottom: 10px;">
            </div>
        <div style="display:flex; gap:10px;">
            <input type="text" id="new-proj-name" placeholder="輸入當前畫布的新專案名稱另存..." style="flex:1; padding:10px; border-radius:6px; border:1px solid #475569; background:#0f172a; color:white; font-family:inherit;">
            <button class="btn btn-file" style="background:#8b5cf6; color:white;" onclick="saveAsNew()">➕ 另存新檔</button>
        </div>
    </div>
</div>


<script>
const canvas = document.getElementById('circuitCanvas');
const ctx = canvas.getContext('2d');
const tooltip = document.getElementById('probe-tooltip');
const gridSize = 20;


let components = [];
let wires = [];
let currentMode = 'select';


let spawnTarget = null;
let isDrawingWire = false;
let wireStart = null;
let mousePos = {x: 0, y: 0};
let globalTime = 0;
let systemShorted = false;
let totalSysCurrent = 0;


// --- 黏性拖曳狀態 ---
let dragTarget = null;
let dragState = null;


// --- 防誤刪狀態 ---
let pendingDelete = null;


// --- 專案狀態 ---
let currentProjId = null;


function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight - 65; }
window.addEventListener('resize', resize); resize();
const snap = (v) => Math.round(v / gridSize) * gridSize;


// ==========================================
// 實體與資料結構
// ==========================================
class Pin {
    constructor(parent, relX, relY, name) {
        this.parent = parent; this.relX = relX; this.relY = relY; this.name = name;
        this.v = 0;
    }
    get absPos() { return { x: this.parent.x + this.relX, y: this.parent.y + this.relY }; }
}
class Component {
    constructor(type, x, y, w, h) {
        this.type = type; this.x = x; this.y = y; this.w = w; this.h = h;
        this.pins = []; this.value = 0; this.i = 0;
    }
    contains(mx, my) { return mx >= this.x && mx <= this.x + this.w && my >= this.y && my <= this.y + this.h; }
   
    drawBase(ctx, color, label, icon) {
        ctx.save();
        let isDragging = (dragTarget === this);
        let isPendingDelete = (pendingDelete === this);
        ctx.fillStyle = systemShorted ? "#331515" : "#1e293b";


        if (isPendingDelete) {
            ctx.shadowBlur = 15; ctx.shadowColor = "#ef4444"; ctx.strokeStyle = "#ef4444"; ctx.lineWidth = 3;
        } else if (isDragging) {
            ctx.shadowBlur = 10; ctx.shadowColor = "#38bdf8"; ctx.strokeStyle = "#38bdf8"; ctx.lineWidth = 2;
        } else {
            ctx.strokeStyle = color; ctx.lineWidth = 2;
        }
       
        ctx.beginPath(); ctx.roundRect(this.x, this.y, this.w, this.h, 6);
        ctx.fill(); ctx.stroke();
        ctx.fillStyle = "#f8fafc"; ctx.font = "bold 11px Inter"; ctx.textAlign = "center";
        ctx.fillText(label, this.x + this.w/2, this.y + this.h/2 + 6);
        if(icon) { ctx.font = "14px Inter"; ctx.fillText(icon, this.x + this.w/2, this.y - 8); }
        this.pins.forEach(p => {
            ctx.fillStyle = "#fbbf24"; ctx.beginPath(); ctx.arc(p.absPos.x, p.absPos.y, 4, 0, Math.PI*2); ctx.fill();
            ctx.strokeStyle = "#000"; ctx.lineWidth=1; ctx.stroke();
        });
        ctx.restore();
    }
}
class Battery extends Component {
    constructor(x, y, v=9) {
        super('BATTERY', x, y, 60, 40); this.value = v;
        this.pins = [new Pin(this, 0, 20, '-'), new Pin(this, 60, 20, '+')];
    }
    draw(ctx) {
        if(systemShorted) {
            ctx.save(); ctx.shadowBlur = 15; ctx.shadowColor = "#ef4444";
            this.drawBase(ctx, "#ef4444", `${this.value}V`, "🔥"); ctx.restore();
        } else { this.drawBase(ctx, "#ef4444", `${this.value}V`, "🔋"); }
    }
}
class Resistor extends Component {
    constructor(x, y, r=220) {
        super('RESISTOR', x, y, 60, 30); this.value = r;
        this.pins = [new Pin(this, 0, 15, '1'), new Pin(this, 60, 15, '2')];
    }
    draw(ctx) { this.drawBase(ctx, "#f59e0b", `${this.value}Ω`, ""); }
}
class LED extends Component {
    constructor(x, y) {
        super('LED', x, y, 40, 40);
        this.pins = [new Pin(this, 0, 20, 'K'), new Pin(this, 40, 20, 'A')];
    }
    draw(ctx) {
        this.drawBase(ctx, "#10b981", "LED");
        let currentMa = Math.abs(this.i) * 1000;
        if (currentMa > 1 && !systemShorted) {
            let intensity = Math.min(1, currentMa / 20);
            ctx.save(); let cx = this.x + 20, cy = this.y + 20;
            ctx.beginPath(); ctx.arc(cx, cy, 18, 0, Math.PI*2);
            ctx.fillStyle = `rgba(20, 184, 166, ${0.3 * intensity})`; ctx.fill();
            ctx.beginPath(); ctx.arc(cx, cy, 10, 0, Math.PI*2);
            ctx.fillStyle = `rgba(94, 234, 212, ${intensity})`;
            ctx.shadowBlur = 20 * intensity; ctx.shadowColor = "#14b8a6"; ctx.fill();
            ctx.restore();
        }
    }
}
class Switch extends Component {
    constructor(x, y) {
        super('SWITCH', x, y, 50, 30); this.isOpen = true;
        this.pins = [new Pin(this, 0, 15, '1'), new Pin(this, 50, 15, '2')];
    }
    draw(ctx) {
        this.drawBase(ctx, "#38bdf8", this.isOpen ? "OFF" : "ON");
        ctx.strokeStyle = this.isOpen ? "#94a3b8" : "#14b8a6";
        ctx.beginPath(); ctx.moveTo(this.x+15, this.y+5); ctx.lineTo(this.x+35, this.isOpen ? this.y-5 : this.y+5); ctx.stroke();
    }
}
class Wire {
    constructor(x1, y1, x2, y2) {
        this.x1 = x1; this.y1 = y1; this.x2 = x2; this.y2 = y2;
        this.v1 = 0; this.v2 = 0; this.i = 0;
    }
    draw(ctx) {
        ctx.save(); ctx.lineWidth = 5; ctx.lineCap = "round";
        let hasCurrent = Math.abs(this.i) > 0.0001;
       
        if (pendingDelete === this) {
            ctx.strokeStyle = "#ef4444"; ctx.shadowBlur = 10; ctx.shadowColor = "#ef4444";
        } else if (systemShorted && hasCurrent) {
            ctx.strokeStyle = "#ef4444"; ctx.shadowBlur = 10; ctx.shadowColor = "#ef4444";
        } else if (hasCurrent) { ctx.strokeStyle = "#0d9488"; }
        else { ctx.strokeStyle = "#334155"; }


        ctx.beginPath(); ctx.moveTo(this.x1, this.y1); ctx.lineTo(this.x2, this.y2); ctx.stroke();
        if (hasCurrent && pendingDelete !== this) {
            ctx.lineWidth = 2; ctx.shadowBlur = 0;
            let speed = Math.max(1, Math.min(15, Math.abs(this.i) * 500));
            let dir = (this.v1 > this.v2) ? 1 : -1;
            ctx.strokeStyle = systemShorted ? "#fca5a5" : "#5eead4";
            ctx.setLineDash([8, 12]);
            ctx.lineDashOffset = -(globalTime * speed * dir);
            ctx.stroke();
        }
        ctx.restore();
    }
}


// ==========================================
// MNA 數學求解器核心
// ==========================================
function formatVal(v, isCurrent = false) {
    if(isCurrent) {
        let mA = v * 1000;
        if(Math.abs(mA) < 0.01) return "0.00 mA";
        if(Math.abs(v) >= 1) return `${v.toFixed(3)} A`;
        return `${mA.toFixed(1)} mA`;
    }
    return `${v.toFixed(2)} V`;
}
function solveMatrix(A, Z) {
    let n = Z.length;
    for (let i = 0; i < n; i++) {
        let maxEl = Math.abs(A[i][i]), maxRow = i;
        for (let k = i + 1; k < n; k++) {
            if (Math.abs(A[k][i]) > maxEl) { maxEl = Math.abs(A[k][i]); maxRow = k; }
        }
        for (let k = i; k < n; k++) { let tmp = A[maxRow][k]; A[maxRow][k] = A[i][k]; A[i][k] = tmp; }
        let tmp = Z[maxRow]; Z[maxRow] = Z[i]; Z[i] = tmp;
        if (Math.abs(A[i][i]) < 1e-12) continue;
        for (let k = i + 1; k < n; k++) {
            let c = -A[k][i] / A[i][i];
            for (let j = i; j < n; j++) { if (i === j) A[k][j] = 0; else A[k][j] += c * A[i][j]; }
            Z[k] += c * Z[i];
        }
    }
    let x = new Array(n).fill(0);
    for (let i = n - 1; i >= 0; i--) {
        if (Math.abs(A[i][i]) < 1e-12) { x[i] = 0; continue; }
        x[i] = Z[i] / A[i][i];
        for (let k = i - 1; k >= 0; k--) Z[k] -= A[k][i] * x[i];
    }
    return x;
}
function calculatePhysics() {
    systemShorted = false; totalSysCurrent = 0;
    let nodeMap = new Map();
    let addNode = (x, y) => {
        let key = `${x},${y}`;
        if (!nodeMap.has(key)) nodeMap.set(key, nodeMap.size);
        return nodeMap.get(key);
    };
    components.forEach(c => c.pins.forEach(p => addNode(p.absPos.x, p.absPos.y)));
    wires.forEach(w => { addNode(w.x1, w.y1); addNode(w.x2, w.y2); });
    let numNodes = nodeMap.size;
    document.getElementById('ui-nodes').innerText = numNodes;
    if (numNodes <= 1) { resetValues(); return; }
    let vSources = components.filter(c => c.type === 'BATTERY');
    let mSize = (numNodes - 1) + vSources.length;
    if (mSize <= 0) { resetValues(); return; }
   
    let A = Array.from({length: mSize}, () => new Array(mSize).fill(0));
    let Z = new Array(mSize).fill(0);
    for (let i = 0; i < numNodes - 1; i++) A[i][i] += 1e-9;
   
    const addConductance = (n1, n2, r) => {
        let g = 1 / r;
        if (n1 > 0) A[n1-1][n1-1] += g;
        if (n2 > 0) A[n2-1][n2-1] += g;
        if (n1 > 0 && n2 > 0) { A[n1-1][n2-1] -= g; A[n2-1][n1-1] -= g; }
    };
    wires.forEach(w => {
        let n1 = nodeMap.get(`${w.x1},${w.y1}`); let n2 = nodeMap.get(`${w.x2},${w.y2}`);
        addConductance(n1, n2, 0.001);
    });
    components.forEach(c => {
        let n1 = nodeMap.get(`${c.pins[0].absPos.x},${c.pins[0].absPos.y}`);
        let n2 = nodeMap.get(`${c.pins[1].absPos.x},${c.pins[1].absPos.y}`);
        if (c.type === 'RESISTOR') addConductance(n1, n2, c.value);
        else if (c.type === 'SWITCH') addConductance(n1, n2, c.isOpen ? 1e9 : 0.001);
        else if (c.type === 'LED') addConductance(n1, n2, 150);
    });
    vSources.forEach((bat, idx) => {
        let nNeg = nodeMap.get(`${bat.pins[0].absPos.x},${bat.pins[0].absPos.y}`);
        let nPos = nodeMap.get(`${bat.pins[1].absPos.x},${bat.pins[1].absPos.y}`);
        let iVarIdx = (numNodes - 1) + idx;
        if (nPos > 0) { A[nPos-1][iVarIdx] += 1; A[iVarIdx][nPos-1] += 1; }
        if (nNeg > 0) { A[nNeg-1][iVarIdx] -= 1; A[iVarIdx][nNeg-1] -= 1; }
        Z[iVarIdx] = bat.value;
    });
   
    let X = solveMatrix(A, Z);
    let getNodeV = (n) => (n === 0) ? 0 : X[n-1];


    components.forEach(c => {
        let v1 = getNodeV(nodeMap.get(`${c.pins[0].absPos.x},${c.pins[0].absPos.y}`));
        let v2 = getNodeV(nodeMap.get(`${c.pins[1].absPos.x},${c.pins[1].absPos.y}`));
        c.pins[0].v = v1; c.pins[1].v = v2;


        if (c.type === 'BATTERY') {
            let vIdx = vSources.indexOf(c); c.i = X[(numNodes - 1) + vIdx];
            totalSysCurrent += Math.abs(c.i);
            if (Math.abs(c.i) > 5) systemShorted = true;
        } else if (c.type === 'RESISTOR') { c.i = (v1 - v2) / c.value;
        } else if (c.type === 'SWITCH') { c.i = (v1 - v2) / (c.isOpen ? 1e9 : 0.001);
        } else if (c.type === 'LED') { c.i = (v1 - v2) / 150; }
    });
    wires.forEach(w => {
        w.v1 = getNodeV(nodeMap.get(`${w.x1},${w.y1}`));
        w.v2 = getNodeV(nodeMap.get(`${w.x2},${w.y2}`));
        w.i = (w.v1 - w.v2) / 0.001;
    });
    document.getElementById('ui-current').innerText = formatVal(totalSysCurrent, true);
    document.getElementById('ui-alert').style.display = systemShorted ? 'block' : 'none';
}
function resetValues() {
    components.forEach(c => { c.i = 0; c.pins.forEach(p => p.v = 0); });
    wires.forEach(w => { w.v1 = w.v2 = w.i = 0; });
    systemShorted = false;
    document.getElementById('ui-current').innerText = "0.00 mA";
    document.getElementById('ui-alert').style.display = 'none';
}


// ==========================================
// 專案檔案庫與「多檔合併」系統
// ==========================================
function getLibrary() {
    let lib = localStorage.getItem('webcircuit_library');
    return lib ? JSON.parse(lib) : { projects: {} };
}
function saveLibrary(lib) { localStorage.setItem('webcircuit_library', JSON.stringify(lib)); }


function updateProjTitle(name) {
    document.getElementById('proj-title').innerText = name || "未命名專案";
}


function newProject() {
    if (components.length > 0 || wires.length > 0) {
        if (!confirm("確定要清空畫布？未儲存的變更將會遺失。")) return;
    }
    currentProjId = null;
    components = []; wires = [];
    pendingDelete = null;
    updateProjTitle("未命名專案");
    calculatePhysics();
}


function openFileManager() {
    document.getElementById('modal-overlay').style.display = 'flex';
    renderFileList();
}
function closeFileManager() {
    document.getElementById('modal-overlay').style.display = 'none';
    document.getElementById('new-proj-name').value = '';
}
function renderFileList() {
    let lib = getLibrary();
    let listDiv = document.getElementById('file-list');
    listDiv.innerHTML = '';


    let entries = Object.entries(lib.projects).sort((a,b) => b[1].updatedAt - a[1].updatedAt);
    if(entries.length === 0) {
        listDiv.innerHTML = '<div style="color:#64748b; text-align:center; padding:10px;">檔案庫空空如也，快點儲存第一個專案吧！</div>';
        return;
    }
    entries.forEach(([id, proj]) => {
        let dateStr = new Date(proj.updatedAt).toLocaleString();
        let isCurrent = (id === currentProjId) ? '<span style="color:#14b8a6; font-size:10px; border:1px solid #14b8a6; padding:2px 4px; border-radius:3px; margin-left:8px;">目前存檔</span>' : '';


        // 加入 Checkbox 讓使用者可以多選
        listDiv.innerHTML += `
        <label class="file-item" style="cursor: pointer;">
            <div class="file-info">
                <input type="checkbox" class="file-cb" value="${id}">
                <div>
                    <h4>${proj.name} ${isCurrent}</h4>
                    <p>更新時間: ${dateStr}</p>
                </div>
            </div>
            <div class="file-actions">
                <button class="btn-load" onclick="loadProject('${id}', event)">單獨開啟(覆蓋)</button>
                <button class="btn-del" onclick="deleteProject('${id}', event)">🗑️</button>
            </div>
        </label>
        `;
    });
}


function getSaveData() {
    return {
        components: components.map(c => ({ type: c.type, x: c.x, y: c.y, value: c.value, isOpen: c.isOpen })),
        wires: wires.map(w => ({ x1: w.x1, y1: w.y1, x2: w.x2, y2: w.y2 }))
    };
}


function saveAsNew() {
    let nameInput = document.getElementById('new-proj-name');
    let name = nameInput.value.trim();
    if(!name) return alert("請輸入新專案名稱！");


    let lib = getLibrary();
    let id = 'proj_' + Date.now();
    lib.projects[id] = { name: name, data: getSaveData(), updatedAt: Date.now() };
    saveLibrary(lib);


    currentProjId = id;
    updateProjTitle(name);
    closeFileManager();
}


function quickSave() {
    if(!currentProjId) {
        alert("這是一個未命名專案，即將為您開啟檔案庫請選擇「另存新檔」。");
        openFileManager();
        return;
    }
    let lib = getLibrary();
    if(lib.projects[currentProjId]) {
        lib.projects[currentProjId].data = getSaveData();
        lib.projects[currentProjId].updatedAt = Date.now();
        saveLibrary(lib);


        let title = document.getElementById('proj-title');
        title.style.color = "#14b8a6";
        title.innerText = lib.projects[currentProjId].name + " (已儲存!)";
        setTimeout(() => { title.style.color = "#94a3b8"; title.innerText = lib.projects[currentProjId].name; }, 1500);
    }
}


// 核心功能：將資料匯入至畫布 (支援座標偏移防重疊)
function appendCircuitData(data, offset = 0) {
    // 為了相容之前的頁籤存檔格式
    let targetComps = data.components;
    let targetWires = data.wires;
    if (data.tabs) {
        targetComps = data.tabs[0].components;
        targetWires = data.tabs[0].wires;
    }


    targetComps.forEach(d => {
        let c;
        let nx = d.x + offset, ny = d.y + offset;
        if(d.type === 'BATTERY') c = new Battery(nx, ny, d.value);
        else if(d.type === 'RESISTOR') c = new Resistor(nx, ny, d.value);
        else if(d.type === 'LED') c = new LED(nx, ny);
        else if(d.type === 'SWITCH') { c = new Switch(nx, ny); c.isOpen = d.isOpen; }
        if(c) components.push(c);
    });
    targetWires.forEach(d => {
        wires.push(new Wire(d.x1 + offset, d.y1 + offset, d.x2 + offset, d.y2 + offset));
    });
}


// 觸發多選合併開啟
function loadSelectedFiles() {
    let checkboxes = document.querySelectorAll('.file-cb:checked');
    if (checkboxes.length === 0) return alert("請先在左側勾選要合併開啟的檔案！");
   
    if (components.length > 0 || wires.length > 0) {
        if (!confirm("畫布即將清空，並為您合併載入勾選的檔案，確定嗎？")) return;
    }


    components = []; wires = []; pendingDelete = null;
    let lib = getLibrary();
   
    let offsetStep = 60; // 每個檔案的元件錯開 60px，避免完全重疊


    checkboxes.forEach((cb, index) => {
        let proj = lib.projects[cb.value];
        if (proj) {
            appendCircuitData(proj.data, index * offsetStep);
        }
    });


    if (checkboxes.length === 1) {
        currentProjId = checkboxes[0].value;
        updateProjTitle(lib.projects[checkboxes[0].value].name);
    } else {
        currentProjId = null; // 合併狀態視為新專案
        updateProjTitle(`合併專案 (${checkboxes.length} 個檔案)`);
    }


    calculatePhysics();
    closeFileManager();
}


// 單獨開啟(會覆蓋)
function loadProject(id, event) {
    event.stopPropagation();
    event.preventDefault();
    if (components.length > 0 || wires.length > 0) {
        if (!confirm("確定要覆蓋當前畫布嗎？未儲存的變更將會遺失。")) return;
    }
   
    let lib = getLibrary();
    let proj = lib.projects[id];
    if(!proj) return;
   
    components = []; wires = []; pendingDelete = null;
    appendCircuitData(proj.data, 0);


    currentProjId = id;
    updateProjTitle(proj.name);
    calculatePhysics();
    closeFileManager();
}


function deleteProject(id, event) {
    event.stopPropagation();
    event.preventDefault();
    if(!confirm("確定要刪除這個專案嗎？動作無法復原。")) return;
    let lib = getLibrary();
    delete lib.projects[id];
    saveLibrary(lib);
    if(currentProjId === id) { currentProjId = null; updateProjTitle("未命名專案"); }
    renderFileList();
}


// ==========================================
// UI 與互動邏輯
// ==========================================
function setMode(mode) {
    currentMode = mode;
    document.querySelectorAll('.btn').forEach(b => b.classList.remove('active'));
    document.getElementById(`btn-${mode}`).classList.add('active');
    canvas.style.cursor = mode === 'wire' ? 'crosshair' : (mode === 'probe' ? 'help' : 'default');
    tooltip.style.display = 'none';
    pendingDelete = null; // 切換模式時取消刪除標記
}
function startDragSpawn(e, type) {
    e.preventDefault(); spawnTarget = type; setMode('select');
    let moveHandler = (ev) => { mousePos = {x: ev.clientX, y: ev.clientY - 65}; };
    let upHandler = (ev) => {
        if (ev.clientY > 65) {
            let x = snap(ev.clientX - 30), y = snap(ev.clientY - 65 - 20);
            let c = spawnTarget === 'BATTERY' ? new Battery(x, y) : spawnTarget === 'RESISTOR' ?
                    new Resistor(x, y) : spawnTarget === 'LED' ? new LED(x, y) : new Switch(x, y);
            components.push(c); calculatePhysics();
        }
        spawnTarget = null;
        window.removeEventListener('mousemove', moveHandler); window.removeEventListener('mouseup', upHandler);
    };
    window.addEventListener('mousemove', moveHandler); window.addEventListener('mouseup', upHandler);
}
function isPointOnWire(px, py, w) {
    const l2 = (w.x1 - w.x2) ** 2 + (w.y1 - w.y2) ** 2;
    if (l2 === 0) return Math.hypot(px - w.x1, py - w.y1) < 6;
    let t = Math.max(0, Math.min(1, ((px - w.x1) * (w.x2 - w.x1) + (py - w.y1) * (w.y2 - w.y1)) / l2));
    return Math.hypot(px - (w.x1 + t * (w.x2 - w.x1)), py - (w.y1 + t * (w.y2 - w.y1))) < 6;
}


canvas.addEventListener('mousedown', e => {
    const mx = e.offsetX, my = e.offsetY;


    // 【防誤刪機制 (點第一下標記，第二下刪除)】
    if (e.button === 2) {
        let target = components.find(c => c.contains(mx, my)) || wires.find(w => isPointOnWire(mx, my, w));
        if (target) {
            if (pendingDelete === target) {
                // 第二次右鍵，刪除元件
                components = components.filter(c => c !== target);
                wires = wires.filter(w => w !== target);
                pendingDelete = null;
                calculatePhysics();
            } else {
                // 第一次右鍵，標記待刪除
                pendingDelete = target;
            }
        } else {
            pendingDelete = null;
        }
        return;
    } else {
        pendingDelete = null; // 按左鍵自動取消刪除狀態
    }


    if (currentMode === 'select') {
        let target = components.find(c => c.contains(mx, my));
        if (target) {
            if (e.shiftKey) {
                if (target.type === 'BATTERY' || target.type === 'RESISTOR') {
                    let unit = target.type === 'BATTERY' ? 'V' : 'Ω';
                    let v = prompt(`輸入實體數值 (${unit}):`, target.value);
                    if (v && !isNaN(v)) { target.value = parseFloat(v); calculatePhysics(); }
                }
                return;
            }


            dragTarget = target;
            dragState = {
                startX: target.x, startY: target.y,
                mouseStartX: snap(mx), mouseStartY: snap(my),
                attachedWires: [], hasDragged: false
            };
            target.pins.forEach(pin => {
                wires.forEach(w => {
                    if (Math.hypot(pin.absPos.x - w.x1, pin.absPos.y - w.y1) < 5) dragState.attachedWires.push({wire: w, end: 1, pin: pin});
                    if (Math.hypot(pin.absPos.x - w.x2, pin.absPos.y - w.y2) < 5) dragState.attachedWires.push({wire: w, end: 2, pin: pin});
                });
            });
        }
    } else if (currentMode === 'wire') {
        isDrawingWire = true;
        wireStart = { x: snap(mx), y: snap(my) };
        components.forEach(c => c.pins.forEach(p => { if(Math.hypot(mx-p.absPos.x, my-p.absPos.y)<15) wireStart = p.absPos; }));
    }
});
canvas.addEventListener('mousemove', e => {
    const mx = e.offsetX, my = e.offsetY;
    mousePos = { x: snap(mx), y: snap(my) };
    components.forEach(c => c.pins.forEach(p => { if(Math.hypot(mx-p.absPos.x, my-p.absPos.y)<15) mousePos = p.absPos; }));
   
    if (dragTarget && currentMode === 'select' && dragState) {
        let dx = snap(mx) - dragState.mouseStartX;
        let dy = snap(my) - dragState.mouseStartY;
        if (dx !== 0 || dy !== 0) {
            dragState.hasDragged = true;
            dragTarget.x = dragState.startX + dx;
            dragTarget.y = dragState.startY + dy;
            dragState.attachedWires.forEach(link => {
                if (link.end === 1) { link.wire.x1 = link.pin.absPos.x; link.wire.y1 = link.pin.absPos.y; }
                else { link.wire.x2 = link.pin.absPos.x; link.wire.y2 = link.pin.absPos.y; }
            });
            calculatePhysics();
        }
    }
    if (currentMode === 'probe') {
        let found = false;
        let hoveredComp = components.find(c => c.contains(mx, my));
        if (hoveredComp) {
            tooltip.style.display = 'block'; tooltip.style.left = e.clientX + 'px'; tooltip.style.top = e.clientY + 'px';
            tooltip.innerHTML = `[${hoveredComp.type}]\n流經電流: ${formatVal(hoveredComp.i, true)}`;
            tooltip.style.borderColor = "#f59e0b"; found = true;
        }
        if (!found) {
            let activeWire = wires.find(w => isPointOnWire(mx, my, w));
            if (activeWire) {
                tooltip.style.display = 'block'; tooltip.style.left = e.clientX + 'px'; tooltip.style.top = e.clientY + 'px';
                tooltip.innerHTML = `[節點電壓]\n絕對電位: ${formatVal(activeWire.v1)}\n支路電流: ${formatVal(Math.abs(activeWire.i), true)}`;
                tooltip.style.borderColor = activeWire.v1 > 0 ? (systemShorted ? "#ef4444" : "#14b8a6") : "#64748b";
                found = true;
            }
        }
        if(!found) tooltip.style.display = 'none';
    }
});
window.addEventListener('mouseup', () => {
    if (isDrawingWire && currentMode === 'wire') {
        if (wireStart.x !== mousePos.x || wireStart.y !== mousePos.y) {
            wires.push(new Wire(wireStart.x, wireStart.y, mousePos.x, mousePos.y));
            calculatePhysics();
        }
        isDrawingWire = false;
    }


    if (dragTarget && dragTarget.type === 'SWITCH' && (!dragState || !dragState.hasDragged)) {
        dragTarget.isOpen = !dragTarget.isOpen; calculatePhysics();
    }
    dragTarget = null;
    dragState = null;
});


// ==========================================
// 渲染引擎
// ==========================================
function loop() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    globalTime += 0.1;
   
    wires.forEach(w => w.draw(ctx));
    if (isDrawingWire) {
        ctx.strokeStyle = "rgba(148, 163, 184, 0.5)"; ctx.lineWidth = 3; ctx.setLineDash([]);
        ctx.beginPath(); ctx.moveTo(wireStart.x, wireStart.y); ctx.lineTo(mousePos.x, mousePos.y); ctx.stroke();
    }
    components.forEach(c => c.draw(ctx));
   
    if (spawnTarget) {
        ctx.globalAlpha = 0.5;
        let sx = mousePos.x - 30, sy = mousePos.y - 20;
        ctx.fillStyle = "#1e293b"; ctx.beginPath(); ctx.roundRect(sx, sy, 60, 40, 6); ctx.fill();
        ctx.globalAlpha = 1.0;
    }
    requestAnimationFrame(loop);
}


loop();
</script>
</body>
</html>
